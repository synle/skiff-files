name: Integration (remote backends)

# Runs the SFTP/FTP/SMB integration suite against the
# `docker/docker-compose.yml` stack. Gated on the
# SKIFF_INTEGRATION env var (the test binary skips every case when
# it's unset) so a developer who hasn't read DEV.md can still run
# `cargo test` locally without docker installed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-integration:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-
            ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Spin up remote backends
        run: |
          docker compose -f docker/docker-compose.ci.yml up -d
          # Give the slowest container (openssh-server) a moment to
          # finish first-boot user provisioning before the suite
          # starts retrying connects.
          sleep 10
          docker compose -f docker/docker-compose.ci.yml ps

      - name: Run integration suite
        env:
          SKIFF_INTEGRATION: "1"
          # russh writes very chatty INFO logs; quieten them so the
          # CI log stays readable when a test fails.
          RUST_LOG: "warn,skiff_files=info"
        working-directory: src-tauri
        run: cargo test --no-default-features --test remote_integration -- --test-threads=1

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::sftp logs"
          docker logs skiff-ci-sftp || true
          echo "::endgroup::"
          echo "::group::ftp logs"
          docker logs skiff-ci-ftp || true
          echo "::endgroup::"
          echo "::group::smb logs"
          docker logs skiff-ci-smb || true
          echo "::endgroup::"

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.ci.yml down -v
