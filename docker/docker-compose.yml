# Remote-backend test harness (macOS / Linux) — SFTP + FTP + SMB.
# Mounts the host's home directory (${HOME}) into every server so you
# can browse / sync your real files through the protocols.
#
# Spin up:    docker compose -f docker/docker-compose.yml up -d
# Tear down:  docker compose -f docker/docker-compose.yml down
#
# Mirrors the one-shot `docker run` recipes in docker/docker.md.
# Windows equivalent: docker-compose.windows.yml (mounts D:/).
#
# Credentials are deliberately weak ("skiff" / "password") and the
# boxes only bind to 127.0.0.1 — never expose this stack to a public
# network.

services:
  # SFTP / SSH. atmoz/sftp is purpose-built for serving a host folder
  # over SFTP — no init-time chown sweep (which made linuxserver's
  # openssh-server image hang for minutes on a large ${HOME} mount).
  # Chroot requires /home/skiff itself to stay root-owned, so the host
  # folder is mounted one level deeper at /home/skiff/data — clients
  # see a single "data/" entry on login.
  skiff-sftp:
    image: atmoz/sftp:alpine
    container_name: skiff-sftp
    command: skiff:password:1001
    ports:
      - "127.0.0.1:2222:22"
    volumes:
      - ${HOME}:/home/skiff/data
    # Explicit ulimits override the daemon default — works around a
    # Docker Desktop 29.x bug where the default-ulimits "Name" field is
    # dropped and runc rejects the empty name. Safe to leave in place.
    ulimits:
      nofile:
        soft: 64000
        hard: 64000

  # Plain FTP with passive-mode ports.
  skiff-ftp:
    image: delfer/alpine-ftp-server:latest
    container_name: skiff-ftp
    environment:
      USERS: "skiff|password|/home/skiff|1000"
      ADDRESS: "127.0.0.1"
      MIN_PORT: "21000"
      MAX_PORT: "21009"
    ports:
      - "127.0.0.1:2121:21"
      - "127.0.0.1:21000-21009:21000-21009"
    volumes:
      - ${HOME}:/home/skiff
    ulimits:
      nofile:
        soft: 64000
        hard: 64000

  # SMB 2/3 — exposes a single share `testshare` backed by ${HOME}.
  skiff-smb:
    image: dperson/samba:latest
    container_name: skiff-smb
    command: >
      -u "skiff;password"
      -s "testshare;/share;yes;no;no;skiff;skiff"
      -p
    ports:
      - "127.0.0.1:1445:445"
    volumes:
      - ${HOME}:/share
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
